<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sanity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    #message {
      margin-top: 12px;
      font-size: 13px;
      color: #d93025;
      min-height: 20px;
    }

    #check-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 100;
    }

    #countdown-display {
      font-size: 48px;
      margin: 20px 0;
      color: #ffcc00;
    }

    #btn-yes {
      padding: 10px 30px;
      font-size: 18px;
      cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="overlay" class="hidden">
    <table>
      <tr><div id="message"></div></tr>
      <tr><button id="retry" > Retry </button></tr>
    </table>    
  </div>

<div id="check-overlay" class="hidden">
  <div id="check-content">
    <h2>Are you still there?</h2>
    <div id="countdown-display">5</div>
    <button id="btn-yes">Yes</button>
  </div>
</div>

  <script>
      //Const and Variables here
      const messageErr = document.getElementById('message');
      const btnRetry = document.getElementById('retry');
      const checkOverlay = document.getElementById('check-overlay');
      const countdownDisplay = document.getElementById('countdown-display');
      const btnYes = document.getElementById('btn-yes');
      const errorMessages = [
        'There was a network error. Please try again. (Error #2000)',
        'Ad Display failed successfully',
        ':( An expected error occured, please try again',
        'Your browser might not be supported, retry to re-enable compatibility mode',
        'Ooops, ERROR #1000',
        'Suspected Robot activity',
        'Practice makes perfect, please retry',
        'Sponsor mandated Error message',
        'ERR#CR0vVP20 retry to re-enable HrsFLY protocol',
      ];

      let firstRandCall = 0;
      let randCallActive = 0;
      let timerID = null;
      let videoInformation = null;
      let currentVidTimeStamp = null;
      let countdownValue = 5;
      let countdownInterval = null;


    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }
      function adFail() {
        window.top.postMessage({ type: 'fail' }, '*'); // Tells index.html to show fail message
      }
      function adPause() {
        window.top.postMessage({ type: 'pause' }, '*');
      }
      function adPlay() {
        window.top.postMessage({ type: 'play' }, '*');
      }
      function requestVideoInfo() {
        window.top.postMessage({ type: 'getVideoInfo' }, '*');
      }
      function setVideoback() {
        // you can change the amount this moves back here
        currentVidTimeStamp = videoInformation.currentTime - Math.random() * 5;
        console.log("new Timestamp:", currentVidTimeStamp);
        window.top.postMessage({ type: 'seekTo', value: currentVidTimeStamp }, '*');
      }

      function startCheckTimer() {
        countdownValue = 5;
        countdownDisplay.textContent = countdownValue;
        checkOverlay.classList.remove('hidden');

        countdownInterval = setInterval(() => {
          countdownValue--;
          countdownDisplay.textContent = countdownValue;

          if (countdownValue <= 0) {
            clearInterval(countdownInterval);
            adFail(); // Timer ran out
          }
        }, 1000);
      }


      function stopTrigger() {
        if (timerID) {
          clearTimeout(timerID);
          console.log("Timer stopped successfully.");
        }
      }

      /*
      Add function to display "are you still there" message when ad is paused, give timer, and fail
      add function to replay the last 50ms while ad is paused, to make funny brrr sounds
      */


      function triggerRandomly() {
        // check if random calls are active. deactivated when overlay is showing or video not started
        if(randCallActive == 1){
          // Generate a random delay between 0 and 15,000 ms (15 seconds)
          const nextDelay = Math.random() * 15000;
          // Schedule the next execution
          timerID = setTimeout(triggerRandomly, nextDelay);

          // when the first call gets triggered ignore to prevent going back too much
          if(firstRandCall < 1){
            console.log("next will trigger");
          }
          // do the random triggers here
          else{
            console.log("Function triggered at:", new Date().toLocaleTimeString());
            randCallActive = 0;
            adPause();
            //stop trigger from firing while paused
            stopTrigger();
            //show overlay
            document.getElementById('overlay').classList.remove('hidden');
            // query Video state
            requestVideoInfo();
            // set random message in message div
            const randomIndex = Math.floor(Math.random() * errorMessages.length);
            messageErr.textContent = errorMessages[randomIndex];
            startCheckTimer();
          }
        }
        else{
          console.log("called but not active");
        }

        //start with triggerRandomly();
        firstRandCall++;
      }


      btnRetry.addEventListener('click', () => {
        document.getElementById('overlay').classList.add('hidden');
        adPlay();
        randCallActive = 1;
        firstRandCall = 0;          
        triggerRandomly();  
        console.log("ad resumed");
      });


      window.addEventListener('message', (event) => {
        // When Video ends do succuess
        if (event.data && event.data.type === 'adFinished') {
          adSuccess()
        }
      });

      window.addEventListener('message', (event) => {
        // When Video starts start the error timer
        if (event.data && event.data.type === 'adStarted') {
          console.log("Video Playing"); 
          randCallActive = 1;  
          triggerRandomly();  
        }
      });

      window.addEventListener('message', (event) => {
        // get that viedeo info
        if (event.data && event.data.type === 'videoInfo') {
        videoInformation = event.data;
        console.log("Current Video Time:", videoInformation.currentTime);
        console.log("Is Paused:", videoInformation.paused);
        // use videoInformation.duration, .volume, .muted, etc. to get queried data
        
        // set Video back, moved here bc of synchronicity issues
        setVideoback();
        }
      });
      //button for are you still there
      btnYes.addEventListener('click', () => {
        clearInterval(countdownInterval);
        checkOverlay.classList.add('hidden');
      });

      // start calling my functions here
   

    
    })(window, document);
  </script>
</body>
</html>
