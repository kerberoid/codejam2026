<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sanity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95); 
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif; 
      z-index: 1000;
    }
    #error-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: 4px solid #d93025; 
      padding: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #message {
      font-size: 16px;
      line-height: 1.5;
      color: #eeeeee;
      margin-bottom: 24px;
      min-height: 48px; 
    }

    #retry {
      background: #d93025;
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #retry:hover {
      background: #b71c1c;
    }

    #check-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 2000;
      color: white;
    }

    #countdown-display {
      font-size: 48px;
      margin: 20px 0;
      color: #ffcc00;
    }

    #btn-yes {
      padding: 10px 30px;
      font-size: 18px;
      cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="check-overlay" class="hidden">
    <div id="check-content">
      <h2>Are you still there?</h2>
      <div id="countdown-display">5</div>
      <button id="btn-yes">Yes</button>
    </div>
  </div>

<div id="overlay" class="hidden">
  <div id="error-card">
    <div id="message">ERR</div>
    <button id="retry">Retry Connection</button>
  </div>
</div>

  <script>
      //Const and Variables here
      const messageErr = document.getElementById('message');
      const btnRetry = document.getElementById('retry');
      const checkOverlay = document.getElementById('check-overlay');
      const countdownDisplay = document.getElementById('countdown-display');
      const btnYes = document.getElementById('btn-yes');
      const overlay = document.getElementById('overlay');

      // change errors mostly to compatability and quality errors
      const errorMessages = [
        'There was a network error. Please try again. (Error #2000)',
        'Ad display failed successfully, please RETRY',
        ':( An expected error occured, please RETRY',
        'Your browser might not be supported, to re-enable compatibility mode please RETRY',
        'Ooops, ERROR #1000, Bitrate limit exceeded, please RETRY',
        'Suspected Robot activity, limited bandwith, please RETRY',
        'Quality too high, lowered expectations, please RETRY',
        'Sponsor mandated Error message could not be displayed, please RETRY',
        'ERR#CR0vVP20 to re-enable HrsFLY protocol, please RETRY',
        'too many Ad requests, server quality lowered, please RETRY',
        'Viewer is busy, lowered quality to save energy, please RETRY',
        'user not PREMIUM member, to continue with lower quality, please RETRY',
        'Hardware acceleration error: Compatibility mode required, please RETRY',
        'The video playback engine encountered an unexpected state, please RETRY',
      ];

      let firstRandCall = 0;
      let randCallActive = 0;
      let timerID = null;
      let videoInformation = null;
      let currentVidTimeStamp = null;
      let countdownValue = 5;
      let countdownInterval = null;
      let isThere = 1;
      // starting values for the added video effects
      let currentHueAdd = 0;
      let currentContrastAdd = 100;
      let currentBrightnessAdd = 100;
      let currentBlurPXAdd = 0;


    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }
      function adFail() {
        window.top.postMessage({ type: 'fail' }, '*');
      }
      function adPause() {
        window.top.postMessage({ type: 'pause' }, '*');
      }
      function adPlay() {
        window.top.postMessage({ type: 'play' }, '*');
      }
      function requestVideoInfo() {
        window.top.postMessage({ type: 'getVideoInfo' }, '*');
      }
      function setVideoback() {
        // you can change the amount this moves back here currently a maximum of 5.5 seconds
        currentVidTimeStamp = videoInformation.currentTime - Math.random() * 5.5;
        console.log("new Timestamp:", currentVidTimeStamp);
        window.top.postMessage({ type: 'seekTo', value: currentVidTimeStamp }, '*');
      }
      // this runs the Visible timeout
      function startCheckTimer() {
        if (isThere == 0){
          countdownValue = 5; //how long the visible Timeout is
          countdownDisplay.textContent = countdownValue;
          checkOverlay.classList.remove('hidden');

          countdownInterval = setInterval(() => {
            countdownValue--;
            countdownDisplay.textContent = countdownValue;

            if (countdownValue <= 0) {
              clearInterval(countdownInterval);
              adFail(); // Timer ran out, Ad Display fails
            }
          }, 1000);
        }
      }
      // runs the timeout while error is on screen before visible timeout shows
      function startPreCheckTimer() {
        isThere = 0; //set if person is there to 0, determines if visible popup shows
        countdownValue = 5; //how long the timeout is until the visible timeout appears
        countdownInterval = setInterval(() => {
          countdownValue--;
          if (countdownValue <= 0) {
            clearInterval(countdownInterval);
            startCheckTimer(); // Timer ran out
          }
        }, 1000);
      }

      // stop the ad breaking trigger timer
      function stopTrigger() {
        if (timerID) {
          clearTimeout(timerID);
          console.log("Timer stopped successfully.");
        }
      }

      function addVideoEffects(hueDegrees,contPercent,brightPercent,blurPX){
        /* index.html applies this string directly to videoEl.style.filter
            skewx didn't work
        */
        currentHueAdd += hueDegrees;
        currentContrastAdd += contPercent;
        currentBrightnessAdd += brightPercent;
        currentBlurPXAdd += blurPX;

        window.top.postMessage({ 
          type: 'setVideoFilter', 
          value: 'contrast('+currentContrastAdd+'%) hue-rotate('+currentHueAdd+'deg) brightness('+currentBrightnessAdd+'%) blur('+currentBlurPXAdd+'px)' 
        }, '*');
        console.log("current contrast is", currentContrastAdd);
        console.log("current hue rotation is", currentHueAdd);
        console.log("current brightness is", currentBrightnessAdd);
        console.log("current blur is", currentBlurPXAdd);
      }

      /*
      add function to replay the last 50ms while ad is paused, to make funny brrr sounds
      add blur (additive)
      add 
      */


      function triggerRandomly() {
        // check if random calls are active. deactivated when overlay is showing or video not started
        if(randCallActive == 1){
          // Generate a random delay between 0 and 16,000 ms (16 seconds)
          // this sets the possible maximum time for the Ad to break
          const nextDelay = Math.random() * 16000;
          // Schedule the next execution
          timerID = setTimeout(triggerRandomly, nextDelay);

          // when the first call gets triggered ignore to prevent going back too much
          if(firstRandCall < 1){
            console.log("next will trigger");
          }
          // do the random triggers here
          else{
            console.log("Function triggered at:", new Date().toLocaleTimeString());
            randCallActive = 0;
            adPause();
            //stop trigger from firing while paused
            stopTrigger();
            
            // query Video state
            requestVideoInfo();
            // set random message in error Card
            const randomIndex = Math.floor(Math.random() * errorMessages.length);
            messageErr.textContent = errorMessages[randomIndex];
            //show Error Card
            document.getElementById('overlay').classList.remove('hidden');
            //clear Timer for next use
            clearInterval(countdownInterval);
            // start pretimeout timer
            startPreCheckTimer();
            //rotate hue, increase contrast, increase brightness, increase Blur, next up increase saturation
            // tested values (45,50,35,1)
            addVideoEffects(45,50,35,1);
            //add a random speed modifier TODO
          }
        }
        else{
          console.log("called but not active");
        }

        //start with triggerRandomly();
        firstRandCall++;
      }


      btnRetry.addEventListener('click', () => {
        document.getElementById('overlay').classList.add('hidden');
        isThere = 1;
        adPlay();
        randCallActive = 1;
        firstRandCall = 0;          
        triggerRandomly();  
        console.log("ad resumed");
      });


      window.addEventListener('message', (event) => {
        // When Video ends do succuess
        if (event.data && event.data.type === 'adFinished') {
          adSuccess()
        }
      });

      window.addEventListener('message', (event) => {
        // When Video starts start the error timer
        if (event.data && event.data.type === 'adStarted') {
          console.log("Video Playing"); 
          randCallActive = 1;  
          triggerRandomly();  
        }
      });

      window.addEventListener('message', (event) => {
        // get that viedeo info
        if (event.data && event.data.type === 'videoInfo') {
        videoInformation = event.data;
        console.log("Current Video Time:", videoInformation.currentTime);
        console.log("Is Paused:", videoInformation.paused);
        // use videoInformation.duration, .volume, .muted, etc. to get queried data
        
        // set Video back, moved here bc of synchronicity issues
        setVideoback();
        }
      });
      //button for are you still there
      btnYes.addEventListener('click', () => {
        isThere = 1;
        clearInterval(countdownInterval);
        checkOverlay.classList.add('hidden');
      });

      // start calling my functions here
   

    
    })(window, document);
  </script>
</body>
</html>
