<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>weak-connection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #signal-container {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      z-index: 5000;
      font-family: 'Roboto', sans-serif;
    }

    .bar {
      width: 4px;
      background: #666; 
      border-radius: 1px;
      transition: height 0.3s, background 0.3s;
    }

    .bar:nth-child(1) { height: 6px; }
    .bar:nth-child(2) { height: 10px; }
    .bar:nth-child(3) { height: 14px; }
    .bar:nth-child(4) { height: 18px; }

    .signal-good .bar { background: #4CAF50; }
    .signal-bad .bar:nth-child(1) { background: #d93025; }
    .signal-bad .bar:nth-child(n+2) { background: #444; }

    #signal-text {
      font-size: 10px;
      color: #aaa;
      margin-left: 5px;
      text-transform: uppercase;
      font-weight: bold;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95); 
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif; 
      z-index: 1000;
    }
    #error-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: 4px solid #d93025; 
      padding: 32px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    #message {
      font-size: 16px;
      line-height: 1.5;
      color: #eeeeee;
      margin-bottom: 24px;
      min-height: 48px; 
    }

    #retry {
      background: #d93025;
      color: white;
      border: none;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #retry:hover {
      background: #b71c1c;
    }

    #check-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      font-family: 'Roboto', sans-serif;
    }
    #check-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: 4px solid #ffcc00;
      padding: 40px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
    #check-card h2 {
      color: #ffffff;
      font-size: 20px;
      margin: 0 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #check-card p {
      color: #aaaaaa;
      font-size: 14px;
      margin-bottom: 20px;
    }

    #countdown-display {
      font-size: 72px;
      font-weight: 900;
      color: #ffcc00;
      margin: 10px 0 30px 0;
      font-variant-numeric: tabular-nums;
    }

    #btn-yes {
      background: transparent;
      color: #ffcc00;
      border: 2px solid #ffcc00;
      padding: 12px 40px;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    #btn-yes:hover {
      background: #ffcc00;
      color: #1a1a1a;
    }

    #loading-area {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #loading-text {
      font-size: 14px;
      font-weight: bold;
      color: #eeeeee;
      margin-top: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .spinner {
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #d93025; 
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress-container {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      z-index: 5000;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: #d93025;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(217, 48, 37, 0.5);
    }

    #time-display {
      position: fixed;
      bottom: 10px;
      right: 15px;
      font-family: 'Roboto', sans-serif;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      z-index: 5000;
      pointer-events: none;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="signal-container" class="signal-good">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <span id="signal-text">Network stable</span>
  </div>

<div id="check-overlay" class="hidden">
  <div id="check-card">
    <h2>User Inactivity</h2>
    <p>Are you still there?</p>
    <div id="countdown-display">5</div>
    <button id="btn-yes">I am here</button>
  </div>
</div>

<div id="overlay" class="hidden">
  <div id="error-card">
    <div id="message">ERR</div>
    <button id="retry">Continue Ad</button>
  </div>
</div>

<div id="loading-area" class="hidden">
  <div class="spinner"></div>
  <div id="loading-text">Reconnecting...</div>
</div>

<div id="progress-container">
  <div id="progress-bar"></div>
</div>
<div id="time-display">0:00 / 0:00</div>

  <script>
      //Const and Variables here
      const messageErr = document.getElementById('message');
      const btnRetry = document.getElementById('retry');
      const checkOverlay = document.getElementById('check-overlay');
      const countdownDisplay = document.getElementById('countdown-display');
      const btnYes = document.getElementById('btn-yes');
      const overlay = document.getElementById('overlay');
      const loadingArea = document.getElementById('loading-area');
      const signalContainer = document.getElementById('signal-container');
      const signalText = document.getElementById('signal-text');
      const progressBar = document.getElementById('progress-bar');
      const timeDisplay = document.getElementById('time-display');

      // changed errors mostly to compatability and quality errors, feel free to delete too silly ones and add your own
      const errorMessages = [
        'There was a network error. Please CONTINUE. (Error #2000)',
        'Enabled browser compatibility mode, please CONTINUE',
        'Premium bitrate limit exceeded, quality lowered, please CONTINUE',
        'Server limited the bandwith, please CONTINUE',
        'Desired quality unachievable, lowered viewport expectations, please CONTINUE',
        'Sponsor mandated Quality could not be served, quality adjusted, please CONTINUE',
        'Network slow, using .hrsFLY codec, please CONTINUE',
        'too many Ad requests, server quality lowered, please CONTINUE',
        'Viewer is busy, lowered quality to save energy, please CONTINUE',
        'Hardware not accelerating: using compatibility mode, please CONTINUE',
        'Suspecting Robot activity, removed quality from stream, if human please CONTINUE',
        'High network noise, turn down fans and AC, reduced quality, please CONTINUE',
        'Crosstalk on the local network, to ensure playback the quality got lowered, please CONTINUE',
        'WWWWtsactp exceeding peering contingent, Quality adjusted, please CONTINUE',
        'Quality adjusted to save bandwith, please CONTINUE',
        'Tracking lost, quality lowered to save bandwith, keep eyes on Ad and please CONTINUE',
        'Bad network connection, quality reduced to ensure playback, please CONTINUE',
        'Network connection unstable, move closer to router or cell tower, quality lowered, please CONTINUE',
        'Network is experiencing high noise, make sure microwaves and and big appliances are OFF, please CONTINUE',
        'OSI-Layer 8 lagging, please CONTINUE',
        'High Network load, turn off streaming services, ensuring SD playback, please CONTINUE',
        'Waiting for buffer to catch up, please CONTINUE',
        //maybe a bit too Silly
        /*
        'Sponsor requieres more attention, quality reduced, please CONTINUE',
        'Sponsor pulled funding, quality lowered, please CONTINUE',
        'user not PREMIUM member, to continue with lower quality, please CONTINUE',
        ':( An expected network error occured, please CONTINUE',
        'Non-compliant user behavior detected, applying digital discipline filter, please CONTINUE',
        'Subliminal messaging buffer underrun. Re-indoctrinating viewer, please CONTINUE',
        'Bit-backflip detected, quality budget lowered, please CONTINUE',
        'M1ll32-Object experiences loss of Agape, Quality reduction applied, please CONTINUE',
        */
      ];
      // Variables for loop logic, do not edit
      let firstRandCall = 0;
      let randCallActive = 0;
      let timerID = null;
      let videoInformation = null;
      let currentVidTimeStamp = null;
      let countdownValue = 5;
      let countdownInterval = null;
      let isThere = 1;
      let loopInterval = null;
      // starting values for the video effects
      let currentHueAdd = 0;
      let currentContrastAdd = 100;
      let currentBrightnessAdd = 100;
      let currentBlurPXAdd = 0;
      let currentSaturationAdd = 100;
      // how much effect per error gets added, feel free to edit
      let additiveHue = 45;         //in deg
      let additiveContrast = 75;    // in %
      let additiveBrightness = 5;  //in %
      let additiveBlurPX = 0;       //in px
      let additiveSaturation = 35;  //in %
      let lowestLoopSpeed = 0.65;     
      let highesLoopSpeed = 1.35;
      // Timing variables, sets timing windows for when errors occur, feel free to edit
      let maximumSetback = 10;        // sets hoch much time an error can set the viewer back initially, reduces each error
      let minimumErrorTime = 5000;   //in ms 1000 = 1s, minimum random error number for error timing
      let maximumErrorTime = 15000;  //in ms, maximum random number for error timing
      let loopduration = 0.75;          //in s floating, how long the loop during error is
      let freezeLoopduration = 0.15;          //in s floating, how long the loop during freeze on reconnect is


    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }
      function adFail() {
        window.top.postMessage({ type: 'fail' }, '*');
      }
      function adPause() {
        window.top.postMessage({ type: 'pause' }, '*');
      }
      function adPlay() {
        window.top.postMessage({ type: 'play' }, '*');
      }
      function adSpeed(bpSpeed) {
        window.top.postMessage({ type: 'setPlaybackRate', value: bpSpeed }, '*');
      }
      function requestVideoInfo() {
        window.top.postMessage({ type: 'getVideoInfo' }, '*');
      }
      //sets video back by amount = maximumSetback
      function setVideoback() {
        currentVidTimeStamp = videoInformation.currentTime - Math.random() * maximumSetback;
        console.log("new Timestamp:", currentVidTimeStamp);
        window.top.postMessage({ type: 'seekTo', value: currentVidTimeStamp }, '*');
        //reduce setback as time moves on, to prevent too much frustration
        if(maximumSetback >= 5){
          maximumSetback = maximumSetback - 1;
        }
      }
      // this runs the Visible timeout
      function startCheckTimer() {
        if (isThere == 0){
          countdownValue = 5; //how long the visible Timeout is
          countdownDisplay.textContent = countdownValue;
          checkOverlay.classList.remove('hidden');

          countdownInterval = setInterval(() => {
            countdownValue--;
            countdownDisplay.textContent = countdownValue;

            if (countdownValue <= 0) {
              clearInterval(countdownInterval);
              adFail(); // Timer ran out, Ad Display fails
            }
          }, 1000);
        }
      }
      // runs the timeout while error is on screen before visible timeout shows
      function startPreCheckTimer() {
        isThere = 0; //set if person is there to 0, determines if visible popup shows
        countdownValue = 5; //how long the timeout is until the visible timeout appears
        countdownInterval = setInterval(() => {
          countdownValue--;
          if (countdownValue <= 0) {
            clearInterval(countdownInterval);
            startCheckTimer(); // Timer ran out
          }
        }, 1000);
      }

      // stop the ad breaking trigger timer
      function stopTrigger() {
        if (timerID) {
          clearTimeout(timerID);
          console.log("Timer stopped successfully.");
        }
      }

      function updateSignal(status) {
        if (status === 'good') {
          signalContainer.className = 'signal-good';
          signalText.textContent = 'Network stable';
        } else {
          signalContainer.className = 'signal-bad';
          signalText.textContent = 'Network recovering';
        }
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ":" + (secs < 10 ? '0' : '') + secs;
      }

      function addVideoEffects(hueDegrees,contPercent,brightPercent,blurPX,saturationPercent){
        currentHueAdd += hueDegrees;
        currentContrastAdd += contPercent;
        currentBrightnessAdd += brightPercent;
        currentBlurPXAdd += blurPX;
        currentSaturationAdd += saturationPercent;

        window.top.postMessage({ 
          type: 'setVideoFilter', 
          value: 'contrast('+currentContrastAdd+'%) hue-rotate('+currentHueAdd+'deg) brightness('+currentBrightnessAdd+'%) blur('+currentBlurPXAdd+'px) saturate('+currentSaturationAdd+'%)' 
        }, '*');
        console.log("current contrast is", currentContrastAdd);
        console.log("current hue rotation is", currentHueAdd);
        console.log("current brightness is", currentBrightnessAdd);
        console.log("current blur is", currentBlurPXAdd);
      }

      function dimVideo() {
        window.top.postMessage({ 
          type: 'setVideoFilter', 
          value: 'contrast('+currentContrastAdd+'%) hue-rotate('+currentHueAdd+'deg) brightness(45%) blur('+currentBlurPXAdd+'px) saturate('+currentSaturationAdd+'%)' 
        }, '*');
      }

      function undimVideo() {
        window.top.postMessage({ 
          type: 'setVideoFilter', 
          value: 'contrast('+currentContrastAdd+'%) hue-rotate('+currentHueAdd+'deg) brightness('+currentBrightnessAdd+'%) blur('+currentBlurPXAdd+'px) saturate('+currentSaturationAdd+'%)' 
        }, '*');
      }

      function runLoopLogic(startTime) {
        //remove existing data
        clearInterval(loopInterval);
        loopInterval = null;
        console.log("Loop cleared");
        loopInterval = setInterval(() => {
          adPlay();
          //playback  with random speed modifier per loop, Math.random() * (max - min) + min
          adSpeed(Math.random()*(highesLoopSpeed-lowestLoopSpeed)+lowestLoopSpeed);
          // Seek back to the start of the loop + random small adjustment
          window.top.postMessage({ type: 'seekTo', value: startTime }, '*');
          console.log("Looping back to:", startTime);
        }, loopduration * 1000);
      }

      function runFreezeLoopLogic(startTime) {
        //remove existing data
        clearInterval(loopInterval);
        loopInterval = null;
        console.log("Loop cleared");
        loopInterval = setInterval(() => {
          adPlay();
          // Seek back to the start of the loop + random small adjustment
          window.top.postMessage({ type: 'seekTo', value: startTime }, '*');
          console.log("Looping back to:", startTime);
        }, freezeLoopduration * 1000);
      }

      function triggerRandomly() {
        // check if random calls are active. deactivated when overlay is showing or video not started
        if(randCallActive == 1){
          // Generate a random delay between 0 and the number in ms 
          // this sets the possible maximum time for the Ad to break
          const nextDelay = Math.random() * (maximumErrorTime - minimumErrorTime) + minimumErrorTime; //1000 = 1s
          // Schedule the next execution
          timerID = setTimeout(triggerRandomly, nextDelay);
          // when the first call gets triggered ignore to prevent going back too much
          if(firstRandCall < 1){
            console.log("next will trigger");
          }
          // do the random triggers here
          else{
            console.log("Function triggered at:", new Date().toLocaleTimeString());
            randCallActive = 0;
            adPause();
            //change connection symbol to bad
            updateSignal('bad');
            //stop trigger from firing while paused
            stopTrigger();
            // query Video state
            requestVideoInfo();
            // set random message in error Card
            const randomIndex = Math.floor(Math.random() * errorMessages.length);
            messageErr.textContent = errorMessages[randomIndex];
            //show Error Card
            document.getElementById('overlay').classList.remove('hidden');
            //clear Timer for next use
            clearInterval(countdownInterval);
            // start pretimeout timer
            startPreCheckTimer();
            //rotate hue, increase contrast, increase brightness, increase Blur
            addVideoEffects(additiveHue,additiveContrast,additiveBrightness,additiveBlurPX,additiveSaturation);
          }
        }
        else{
          console.log("called but not active");
        }
        //start with triggerRandomly();
        firstRandCall++;
      }

      btnRetry.addEventListener('click', () => {
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('loading-area').classList.remove('hidden');
        dimVideo();
        isThere = 1; 
        clearInterval(loopInterval); //clear loop timer
        adPause();

        //simulate "Reconnecting" delay before starting again
        //set time constraint for reconnect
        const reconnectTime = Math.random() * (5000 - 1500) + 1500;

        //make noise go brrrr
        runFreezeLoopLogic(currentVidTimeStamp);

        setTimeout(() => {
          clearInterval(loopInterval); //clear loop timer
          undimVideo();
          document.getElementById('loading-area').classList.add('hidden');
          adPlay();
          randCallActive = 1;
          firstRandCall = 0;          
          triggerRandomly();  
          //set connection icon back to good
          updateSignal('good');
        }, reconnectTime);

      });


      window.addEventListener('message', (event) => {
        // When Video ends do succuess
        if (event.data && event.data.type === 'adFinished') {
          adSuccess()
        }
      });

      window.addEventListener('message', (event) => {
        // When Video starts start the error timer
        if (event.data && event.data.type === 'adStarted') {
          console.log("Video Playing"); 
          randCallActive = 1;  
          triggerRandomly();  
        }
      });

      window.addEventListener('message', (event) => {
        // get that viedeo info
        if (event.data && event.data.type === 'videoInfo') {
        videoInformation = event.data;
        console.log("Current Video Time:", videoInformation.currentTime);
        console.log("Is Paused:", videoInformation.paused);
        // use videoInformation.duration, .volume, .muted, etc. to get queried data
        
        // set Video back, moved here bc of synchronicity issues
        setVideoback();
        //run loop on rewound timestamp
        runLoopLogic(currentVidTimeStamp);
        }
      });

      //button for are you still there
      btnYes.addEventListener('click', () => {
        isThere = 1;
        clearInterval(countdownInterval);
        checkOverlay.classList.add('hidden');
        console.log("Activity confirmed by user.");
      });
      // updates progress bar from timeupdate event
      window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'timeupdate') {
        const { currentTime, duration } = event.data;
        const percent = (currentTime / duration) * 100;
        progressBar.style.width = percent + "%";
        timeDisplay.textContent = formatTime(currentTime) + " / " + formatTime(duration);
      }
    });
    
    })(window, document);
  </script>
</body>
</html>
