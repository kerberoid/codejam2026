<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sanity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    #message {
      margin-top: 12px;
      font-size: 13px;
      color: #d93025;
      min-height: 20px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="overlay" class="hidden">
    <button id="retry" > Retry </button>
  </div>

  <script>
      //Const and Variables here
      const messageErr = document.getElementById('message');
      const btnRetry = document.getElementById('retry');

      let firstRandCall = 0;
      let randCallActive = 0;
      let timerId = null;


    (function(window, document) {
      function adSuccess() {
        window.top.postMessage({ type: 'success' }, '*');
      }
      function adPause() {
        window.top.postMessage({ type: 'pause' }, '*');
      }
      function adPlay() {
        window.top.postMessage({ type: 'play' }, '*');
      }

      function stopTrigger() {
        if (timerId) {
          clearTimeout(timerId);
          console.log("Timer stopped successfully.");
        }
      }

      function triggerRandomly() {
        // check if random calls are active. deactivated when overlay is showing or video not started
        if(randCallActive == 1){
          // Generate a random delay between 0 and 10,000 ms (10 seconds)
          const nextDelay = Math.random() * 10000;
          // Schedule the next execution
          timerID = setTimeout(triggerRandomly, nextDelay);

          // when the first call gets triggered ignore to prevent going back too much
          if(firstRandCall < 1){
            console.log("next will trigger");
          }
          // do the random triggers here
          else{
            console.log("Function triggered at:", new Date().toLocaleTimeString());
            randCallActive = 0;
            adPause();
            //stop trigger from firing while paused
            stopTrigger();
            //show overlay
            document.getElementById('overlay').classList.remove('hidden');
          }
      }
      else{
        console.log("called but not active");
      }

        //start with triggerRandomly();
        firstRandCall++;
      }


      btnRetry.addEventListener('click', () => {
        document.getElementById('overlay').classList.add('hidden');
        adPlay();
        randCallActive = 1;          
        triggerRandomly();  
        console.log("ad resumed");
      });

 
/*
      const errorMessages = [
        'There was a network error. Please try again. (Error #2000)',
        'Ad Display failed successfully',
        ':( An expected error occured, please try again',
        'Your browser might not be supported, retry to re-enable compatibility mode',
        'Ooops, ERROR #1000',
      ];
*/
      window.addEventListener('message', (event) => {
        // When Video ends do succuess
        if (event.data && event.data.type === 'adFinished') {
          adSuccess()
        }
      });

      window.addEventListener('message', (event) => {
        // When Video starts start the error timer
        if (event.data && event.data.type === 'adStarted') {
          console.log("Video Playing"); 
          randCallActive = 1;  
          triggerRandomly();  
        }
      });

      // start calling my functions here
   


    })(window, document);
  </script>
</body>
</html>
